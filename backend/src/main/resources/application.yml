spring:
  application:
    name: meetr
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/meetr?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123qwe!@#QWE
  sql:
    init:
      mode: always
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.meetr.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true
    jdbc-type-for-null: 'NULL'

pagehelper:
  helperDialect: mysql
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql

server:
  port: 8080

# JVM 启动参数需要加: -Duser.timezone=Asia/Shanghai
# 或者在运行配置里设置: -Duser.timezone=Asia/Shanghai
